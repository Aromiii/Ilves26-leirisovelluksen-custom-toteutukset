<!DOCTYPE html>
<html lang="fi">
    <head>
        <meta charset="UTF-8">
        <title>Ilves26 aikataulu</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Jost&family=Nunito:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div  id="subcamp" hidden="hidden">
            <div class="information-form">
                <h3 class="form-heading">Valitse alaleiri</h3>
                <button class="subcamp-button" value="alaleiri 1">Valitse alaleiri 1</button>
                <button class="subcamp-button" value="alaleiri 2">Valitse alaleiri 2</button>
            </div>
        </div>
        <div id="agegroup" hidden="hidden">
            <div class="information-form">
                <div class="agegroup-grid">
                    <h3 class="form-heading">Valitse ikäkausi</h3>
                    <button class="agegroup-button" value="sudenpentu">Sudenpentu</button>
                    <button class="agegroup-button" value="seikkailija">Seikkailija</button>
                    <button class="agegroup-button" value="tarpoja">Tarpoja</button>
                    <button class="agegroup-button" value="samoaja">Samoaja</button>
                    <button class="agegroup-button" value="vaeltaja">Vaeltaja</button>
                    <button class="agegroup-button" value="aikuinen">Aikuinen</button>
                    <button class="back-button">Takaisin</button>
                </div>
            </div>
        </div>
        <ul id="timetable" hidden="hidden">
        </ul>
        <script type="module">
            import ICAL from 'https://cdn.jsdelivr.net/npm/ical.js@2.0.1/+esm';
            window.ICAL = ICAL;
        </script>
        <script src="index.js"></script>
    </body>
</html>
